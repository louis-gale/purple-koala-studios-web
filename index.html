<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purple Koala Studios</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800;900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <!-- Required for GitHub Pages / browser preview without a bundler -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    :root {
      --bg: #000000;
      --purple: oklch(72% 0.32 310);
      --purple-soft: oklch(66% 0.24 310);
      --text-muted: rgba(255, 255, 255, 0.68);
      --glass: rgba(255, 255, 255, 0.045);
      --glass-border: rgba(255, 255, 255, 0.10);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: white;
      font-family: "Inter", system-ui, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      display: block;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 7vh 8vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      pointer-events: none;
    }

    .eyebrow {
      font-size: clamp(0.72rem, 1vw, 0.9rem);
      font-weight: 800;
      letter-spacing: 0.28em;
      color: var(--purple-soft);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      text-shadow: 0 0 22px rgba(191, 91, 255, 0.45);
    }

    h1 {
      font-family: "Space Grotesk", "Inter", sans-serif;
      font-size: clamp(4.5rem, 11vw, 12rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.82;
      max-width: 1100px;
      background: linear-gradient(110deg, #ffffff 0%, #f7ebff 35%, var(--purple) 82%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-wrap: balance;
      filter: drop-shadow(0 0 35px rgba(177, 83, 255, 0.25));
    }

    .copy {
      margin-top: 1.6rem;
      max-width: 620px;
      font-size: clamp(1rem, 1.5vw, 1.35rem);
      line-height: 1.55;
      color: var(--text-muted);
    }

    .signup {
      margin-top: 2.8rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    input, button {
      height: 52px;
      border-radius: 999px;
      font: inherit;
      border: 1px solid var(--glass-border);
      outline: none;
    }

    input {
      min-width: min(360px, 82vw);
      padding: 0 1.25rem;
      color: white;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 20px 70px rgba(0,0,0,0.25);
    }

    input::placeholder {
      color: rgba(255,255,255,0.45);
    }

    button {
      padding: 0 1.45rem;
      cursor: pointer;
      color: #08030d;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: var(--purple);
      box-shadow: 0 0 34px rgba(188, 84, 255, 0.38);
    }

    .footer-mark {
      position: absolute;
      left: 8vw;
      bottom: 5vh;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.34em;
      color: rgba(255,255,255,0.42);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="eyebrow">Purple Koala Studios</div>
    <h1>Games that glow after dark.</h1>
    <p class="copy">We build kinetic, luminous play worlds with sharp mechanics, bold character, and the kind of energy that makes players lean forward.</p>

    <form class="signup">
      <input type="email" placeholder="Enter your email" aria-label="Email address" />
      <button type="submit">JOIN</button>
    </form>

    <div class="footer-mark">Independent Game Studio</div>
  </main>

  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/examples/jsm/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/examples/jsm/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/examples/jsm/postprocessing/UnrealBloomPass.js";

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.018);

    const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 11);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 1);
    renderer.domElement.style.position = "fixed";
    renderer.domElement.style.inset = "0";
    renderer.domElement.style.zIndex = "0";
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.35,
      0.5,
      0.18
    );
    composer.addPass(bloom);

    const particleCount = 1300;
    const connectionDistance = 1.22;
    const connectionDistanceSq = connectionDistance * connectionDistance;
    const cellSize = connectionDistance;
    const maxConnections = 9000;

    const positions = new Float32Array(particleCount * 3);
    const basePositions = new Float32Array(particleCount * 3);
    const velocities = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      const i3 = i * 3;
      const radius = 3.4 + Math.random() * 5.8;
      const angle = Math.random() * Math.PI * 2;
      const height = (Math.random() - 0.5) * 8.6;
      const spiral = angle + height * 0.22;

      basePositions[i3] = Math.cos(spiral) * radius + (Math.random() - 0.5) * 2.0;
      basePositions[i3 + 1] = height;
      basePositions[i3 + 2] = Math.sin(spiral) * radius + (Math.random() - 0.5) * 2.0;

      positions[i3] = basePositions[i3];
      positions[i3 + 1] = basePositions[i3 + 1];
      positions[i3 + 2] = basePositions[i3 + 2];

      velocities[i3] = (Math.random() - 0.5) * 0.002;
      velocities[i3 + 1] = (Math.random() - 0.5) * 0.002;
      velocities[i3 + 2] = (Math.random() - 0.5) * 0.002;
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

    const sprite = makeGlowSprite();

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.14,
      map: sprite,
      color: new THREE.Color(0xbf6cff),
      transparent: true,
      opacity: 0.95,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const linePositions = new Float32Array(maxConnections * 2 * 3);
    const lineGeometry = new THREE.BufferGeometry();
    lineGeometry.setAttribute("position", new THREE.BufferAttribute(linePositions, 3));
    lineGeometry.setDrawRange(0, 0);

    const lineMaterial = new THREE.LineBasicMaterial({
      color: new THREE.Color(0xb45cff),
      transparent: true,
      opacity: 0.05,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const connectionLines = new THREE.LineSegments(lineGeometry, lineMaterial);
    scene.add(connectionLines);

    const group = new THREE.Group();
    group.add(particles);
    group.add(connectionLines);
    scene.add(group);

    const grid = new Map();
    const neighborOffsets = [];

    for (let x = -1; x <= 1; x++) {
      for (let y = -1; y <= 1; y++) {
        for (let z = -1; z <= 1; z++) {
          neighborOffsets.push([x, y, z]);
        }
      }
    }

    const mouse = { x: 0, y: 0 };

    window.addEventListener("mousemove", (event) => {
      mouse.x = (event.clientX / window.innerWidth - 0.5) * 2;
      mouse.y = (event.clientY / window.innerHeight - 0.5) * 2;
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloom.setSize(window.innerWidth, window.innerHeight);
    });

    let isPaused = false;

    document.addEventListener("visibilitychange", () => {
      isPaused = document.hidden;
      if (!isPaused) requestAnimationFrame(animate);
    });

    function animate(time) {
      if (isPaused) return;
      requestAnimationFrame(animate);

      const t = time * 0.001;
      const pos = particleGeometry.attributes.position.array;

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        const driftX = Math.sin(t * 0.62 + i * 0.13) * velocities[i3] * 220;
        const driftY = Math.cos(t * 0.57 + i * 0.11) * velocities[i3 + 1] * 220;
        const driftZ = Math.sin(t * 0.53 + i * 0.09) * velocities[i3 + 2] * 220;

        pos[i3] = basePositions[i3] + Math.sin(t * 0.55 + i * 0.07) * 0.18 + driftX;
        pos[i3 + 1] = basePositions[i3 + 1] + Math.cos(t * 0.48 + i * 0.05) * 0.18 + driftY;
        pos[i3 + 2] = basePositions[i3 + 2] + Math.sin(t * 0.42 + i * 0.04) * 0.18 + driftZ;
      }

      particleGeometry.attributes.position.needsUpdate = true;
      updateConnections(pos);

      group.rotation.y += (mouse.x * 0.16 - group.rotation.y) * 0.045;
      group.rotation.x += (mouse.y * 0.12 - group.rotation.x) * 0.045;
      group.rotation.z = Math.sin(t * 0.08) * 0.035;

      composer.render();
    }

    function updateConnections(pos) {
      grid.clear();

      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        const cx = Math.floor(pos[i3] / cellSize);
        const cy = Math.floor(pos[i3 + 1] / cellSize);
        const cz = Math.floor(pos[i3 + 2] / cellSize);
        const key = `${cx},${cy},${cz}`;

        let bucket = grid.get(key);
        if (!bucket) {
          bucket = [];
          grid.set(key, bucket);
        }
        bucket.push(i);
      }

      let ptr = 0;
      let connections = 0;

      for (let i = 0; i < particleCount; i++) {
        if (connections >= maxConnections) break;

        const i3 = i * 3;
        const x1 = pos[i3];
        const y1 = pos[i3 + 1];
        const z1 = pos[i3 + 2];
        const cx = Math.floor(x1 / cellSize);
        const cy = Math.floor(y1 / cellSize);
        const cz = Math.floor(z1 / cellSize);

        for (const [ox, oy, oz] of neighborOffsets) {
          const bucket = grid.get(`${cx + ox},${cy + oy},${cz + oz}`);
          if (!bucket) continue;

          for (let b = 0; b < bucket.length; b++) {
            const j = bucket[b];
            if (j <= i) continue;

            const j3 = j * 3;
            const dx = x1 - pos[j3];
            const dy = y1 - pos[j3 + 1];
            const dz = z1 - pos[j3 + 2];
            const d2 = dx * dx + dy * dy + dz * dz;

            if (d2 < connectionDistanceSq) {
              linePositions[ptr++] = x1;
              linePositions[ptr++] = y1;
              linePositions[ptr++] = z1;
              linePositions[ptr++] = pos[j3];
              linePositions[ptr++] = pos[j3 + 1];
              linePositions[ptr++] = pos[j3 + 2];
              connections++;

              if (connections >= maxConnections) break;
            }
          }
          if (connections >= maxConnections) break;
        }
      }

      lineGeometry.setDrawRange(0, connections * 2);
      lineGeometry.attributes.position.needsUpdate = true;
    }

    function makeGlowSprite() {
      const canvas = document.createElement("canvas");
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      gradient.addColorStop(0.0, "rgba(255,255,255,1)");
      gradient.addColorStop(0.22, "rgba(215,150,255,0.9)");
      gradient.addColorStop(0.48, "rgba(165,70,255,0.38)");
      gradient.addColorStop(1.0, "rgba(80,0,140,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(canvas);
    }

    animate(0);
  </script>
</body>
</html>
